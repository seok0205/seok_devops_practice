spring:
  application:
    name: seok

  data:
    redis:
#      host: redis
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}

  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    database: mysql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true

  mail:
    host: smtp.naver.com
    port: 465
    username: ${NAVER_ID}
    password: ${NAVER_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: smtp.naver.com

management:
  endpoints:
    web:
      exposure:
        # 외부로 노출할 액츄에이터 엔드포인트를 지정, 프로메테우스용 수집 경로, 애플리케이션 상태 체크 경로
        include: "health, prometheus, env"
  endpoint:
    health:
      # health 체크 시 상세한 상태 정보(디스크, DB 연결 등)를 보여줌
      show-details: always

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html